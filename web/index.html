<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Keto Friendly Dinners</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="hero">
  <h1>Keto Friendly Dinners</h1>
  <p>Strict Keto · Master Rotation · <span id="dinnerCount">…</span> Dinners</p>
  <div class="view-tabs">
    <button class="tab active" data-view="mealplan">Meal Plan</button>
    <button class="tab" data-view="browse">Browse All</button>
    <button class="tab" data-view="shopping">Shopping List</button>
  </div>
  <div class="legend">
    <span>Easy &lt;15 min</span>
    <span>Med 15–30 min</span>
    <span>Hard &gt;30 min</span>
    <span>K = Kid Friendly</span>
  </div>
</div>
<div class="wrap">
  <div id="viewMealplan" class="grid"></div>
  <div id="viewBrowse" class="browse-wrap" hidden></div>
  <div id="viewShopping" class="shop-wrap" hidden></div>
  <p id="loadingMsg" class="loading-msg">Loading recipes…</p>
</div>
<script src="/static/app.js"></script>
</body>
</html>
